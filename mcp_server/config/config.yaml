# Rekollect MCP Server Configuration
# Neo4j + Ollama embeddings + OpenAI for extraction

server:
  transport: "http"
  host: "0.0.0.0"
  port: 8100

llm:
  provider: "openai"
  model: "gpt-4.1-nano"
  max_tokens: 4096

  providers:
    openai:
      api_key: ${OPENAI_API_KEY}
      api_url: ${OPENAI_API_URL:https://api.openai.com/v1}

embedder:
  provider: "ollama"
  model: "nomic-embed-text"
  dimensions: 768

  providers:
    ollama:
      base_url: "http://localhost:11434"

database:
  provider: "neo4j"

  providers:
    neo4j:
      uri: "bolt://localhost:7687"
      username: "neo4j"
      password: "memory-engine-dev"
      database: "neo4j"

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:rekollect}
  user_id: ${USER_ID:jarvis}
  entity_types:
    - name: "Person"
      description: "People, users, contacts, or named individuals"
    - name: "Project"
      description: "Software projects, apps, products, or codebases"
    - name: "Preference"
      description: "User preferences, choices, opinions, or decisions"
    - name: "Tool"
      description: "Software tools, libraries, frameworks, APIs, or services"
    - name: "Decision"
      description: "Technical or product decisions with rationale"
    - name: "Organization"
      description: "Companies, teams, communities, or groups"
    - name: "Concept"
      description: "Technical concepts, patterns, or methodologies"
    - name: "Location"
      description: "Physical or virtual places, URLs, file paths"
